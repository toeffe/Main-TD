<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tower Defense</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root, html[data-theme="dark"] {
      --accent: #b0b0b0;
      --accent-muted: #888888;
      --gold-ui: #d0d0d0;
      --danger: #8a8a8a;
      --success: #eaeaea;
      --bg-page: #0a0a0a;
      --bg-canvas: #080808;
      --panel: rgba(18,18,18,0.92);
      --panel-elev: rgba(24,24,24,0.96);
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.22);
      --text: #dcdcdc;
      --text-dim: rgba(220,220,220,0.55);
      --btn-bg1: #3a3a3a;
      --btn-bg2: #2a2a2a;
      --btn-bg-hover1: #4a4a4a;
      --btn-bg-hover2: #333333;
      --card-bg: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.1);
      --overlay-scrim: rgba(8,8,8,0.88);
    }
    html[data-theme="light"] {
      --accent: #404040;
      --accent-muted: #606060;
      --gold-ui: #2a2a2a;
      --danger: #5a5a5a;
      --success: #1a1a1a;
      --bg-page: #e2e2e2;
      --bg-canvas: #dedede;
      --panel: rgba(240,240,240,0.94);
      --panel-elev: rgba(252,252,252,0.98);
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.2);
      --text: #1a1a1a;
      --text-dim: rgba(26,26,26,0.55);
      --btn-bg1: #c8c8c8;
      --btn-bg2: #b0b0b0;
      --btn-bg-hover1: #d8d8d8;
      --btn-bg-hover2: #c0c0c0;
      --card-bg: rgba(0,0,0,0.04);
      --card-border: rgba(0,0,0,0.1);
      --overlay-scrim: rgba(228,228,228,0.92);
    }
    html {
      height: 100%;
      height: -webkit-fill-available;
    }
    body {
      min-height: 100%;
      min-height: -webkit-fill-available;
      width: 100%;
      background: var(--bg-page);
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    #stage-fit {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      /* Edge-to-edge; only respect safe areas (no extra “window margin”). */
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px)
        env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
      box-sizing: border-box;
      overflow: hidden;
      background: var(--bg-page);
    }
    #layout-root {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      box-sizing: border-box;
    }
    /* Only the playfield is non-uniformly scaled; HUD + shop stay crisp at 1:1. */
    #game-scale-holder {
      flex: 1 1 0;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      background: var(--bg-canvas);
    }
    #game-scale-clip {
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg-canvas);
      box-sizing: border-box;
    }
    #game-wrap {
      position: absolute;
      left: 0;
      top: 0;
      width: 1080px;
      height: 600px;
      transform-origin: top left;
      will-change: transform;
    }
    #hud {
      flex-shrink: 0;
      width: 100%;
      min-height: 48px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      padding: 10px 20px 12px;
      gap: 14px 18px;
      z-index: 20;
      background: var(--panel);
      border: none;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
    }
    .hud-item { display: flex; align-items: center; gap: 8px; font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; color: var(--text); }
    .hud-item .val { color: var(--accent); min-width: 36px; }
    .hud-item.gold .val { color: var(--gold-ui); }
    .hud-item.lives .val { color: var(--danger); }
    .hud-item.score .val { color: var(--accent-muted); }
    #theme-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      padding: 6px 4px 6px 0;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      letter-spacing: 0.06em;
    }
    #theme-btn:hover { color: var(--text); }
    #wave-btn {
      margin-left: auto;
      background: var(--btn-bg1);
      border: none;
      color: var(--accent);
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, filter 0.2s;
      text-transform: uppercase;
    }
    #wave-btn:hover:not(:disabled) { background: var(--btn-bg-hover1); filter: brightness(1.08); }
    #wave-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #speed-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 700;
      padding: 7px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #speed-btn:hover { border-color: var(--border); background: var(--card-bg); }
    #auto-wave-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      padding: 7px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      letter-spacing: 0.05em;
    }
    #auto-wave-btn:hover { border-color: var(--border); background: var(--card-bg); }
    #auto-wave-btn.active { border-color: var(--border-strong); color: var(--accent); background: var(--card-bg); }
    .tower-card.locked { opacity: 0.52; cursor: default; filter: grayscale(0.35); }
    .tower-card.locked:hover { border-color: var(--card-border); background: var(--card-bg); }
    .tower-card .t-lock { font-size: 7px; color: var(--text-dim); letter-spacing: 0.04em; }
    #game-container {
      width: 100%; height: 100%;
      background: var(--bg-canvas); position: relative;
    }
    #game-container canvas { display: block; width: 100%; height: auto; }
    #bottom-panel {
      flex-shrink: 0;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      z-index: 20;
      padding: 14px 20px 18px;
      background: var(--panel);
      border: none;
      border-top: 1px solid var(--border);
      border-radius: 0;
    }
    .tower-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      min-width: 74px;
      user-select: none;
    }
    .tower-card:hover { border-color: var(--border-strong); background: var(--card-bg); }
    .tower-card.selected { border-color: var(--accent); background: var(--card-bg); }
    .tower-card.unaffordable { opacity: 0.38; cursor: not-allowed; }
    .tower-card .t-name { font-family: 'Orbitron', monospace; font-size: 8px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text); }
    .tower-card .t-cost { font-size: 10px; color: var(--gold-ui); font-weight: 700; }
    .tower-card .t-stats { font-size: 8px; color: var(--text-dim); text-align: center; line-height: 1.4; }
    #info-panel {
      margin-left: auto;
      min-width: 160px;
      max-width: min(320px, 100%);
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.65;
      padding-left: 16px;
      border-left: 1px solid var(--border);
    }
    #info-panel .info-title { font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
    #overlay {
      position: absolute; inset: 0;
      display: none; align-items: center; justify-content: center;
      background: var(--overlay-scrim); z-index: 50;
    }
    #overlay.show { display: flex; }
    #overlay-box {
      text-align: center;
      padding: 40px 56px;
      background: var(--panel-elev);
      border: none;
      border-radius: 0;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
    }
    html[data-theme="light"] #overlay-box {
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }
    #overlay-box h1 { font-family: 'Orbitron', monospace; font-size: 38px; font-weight: 900; margin-bottom: 10px; }
    #overlay-box h1.victory { color: var(--success); }
    #overlay-box h1.defeat { color: var(--danger); }
    #overlay-box p { font-size: 13px; color: var(--text); margin-bottom: 24px; }
    #overlay-box .stat { color: var(--gold-ui); font-weight: 700; }
    #restart-btn {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 12px 32px;
      background: var(--btn-bg1);
      border: none;
      color: var(--accent);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, filter 0.2s;
    }
    #restart-btn:hover { background: var(--btn-bg-hover1); filter: brightness(1.06); }
    #bottom-panel { overflow-x: auto; flex-wrap: nowrap; align-items: flex-start; }
    .tower-card { flex-shrink: 0; }
    #info-panel { flex-shrink: 0; margin-left: auto; }
    #lb-btn {
      background: transparent; border: 1px solid transparent; color: var(--text-dim);
      font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700;
      padding: 7px 10px; border-radius: 4px; cursor: pointer; letter-spacing: 0.06em;
    }
    #lb-btn:hover { border-color: var(--border); color: var(--text); background: var(--card-bg); }
    .lb-overlay {
      position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center;
      background: var(--overlay-scrim); padding: 16px; box-sizing: border-box;
    }
    .lb-overlay.show { display: flex; }
    .lb-panel {
      background: var(--panel-elev); max-width: 420px; width: 100%; max-height: 85vh; overflow: hidden;
      display: flex; flex-direction: column; border: 1px solid var(--border); padding: 20px 22px;
    }
    .lb-panel h2 { font-family: 'Orbitron', monospace; font-size: 14px; margin-bottom: 12px; letter-spacing: 0.1em; }
    .lb-status { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; min-height: 1.2em; }
    .lb-panel ol { list-style: none; margin: 0; padding: 0; overflow-y: auto; flex: 1; font-size: 12px; }
    .lb-panel li {
      display: flex; justify-content: space-between; gap: 12px; padding: 8px 0;
      border-bottom: 1px solid var(--border); color: var(--text);
    }
    .lb-panel li span:first-child { color: var(--gold-ui); font-weight: 700; min-width: 1.5em; }
    .lb-panel li .lb-n { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-panel li .lb-s { flex-shrink: 0; color: var(--accent); font-family: 'Share Tech Mono', monospace; }
    #lb-close {
      margin-top: 14px; align-self: flex-end;
      font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700;
      padding: 8px 16px; background: var(--btn-bg1); border: none; color: var(--accent); border-radius: 4px; cursor: pointer;
    }
    #lb-close:hover { filter: brightness(1.08); }
    .overlay-lb-row { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; }
    #lb-name-input {
      font-family: 'Share Tech Mono', monospace; font-size: 12px; padding: 8px 10px; width: 180px; max-width: 100%;
      background: var(--card-bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px;
    }
    #lb-submit-btn {
      font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700;
      padding: 8px 14px; background: var(--btn-bg1); border: none; color: var(--accent); border-radius: 4px; cursor: pointer;
    }
    #lb-submit-btn:hover { filter: brightness(1.08); }
    #lb-submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .lb-submit-hint { font-size: 10px; color: var(--text-dim); width: 100%; text-align: center; margin-top: 6px; }
    ::-webkit-scrollbar { display: none; }
  </style>
  <script src="firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="stage-fit">
<div id="layout-root">
  <div id="hud">
    <button type="button" id="theme-btn" title="Toggle light / dark">LIGHT</button>
    <div class="hud-item gold"><span>⬡</span><span>GOLD</span><span class="val" id="hud-gold">195</span></div>
    <div class="hud-item lives"><span>♥</span><span>LIVES</span><span class="val" id="hud-lives">20</span></div>
    <div class="hud-item"><span>◈</span><span>WAVE</span><span class="val" id="hud-wave">0 ∞</span></div>
    <div class="hud-item" style="font-size:9px;opacity:0.85"><span>⌗</span><span class="val" id="hud-map" style="min-width:52px">—</span></div>
    <div class="hud-item score"><span>✦</span><span>SCORE</span><span class="val" id="hud-score">0</span></div>
    <div class="hud-item"><span>⚔</span><span>KILLS</span><span class="val" id="hud-kills">0</span></div>
    <button type="button" id="speed-btn">2× SPEED</button>
    <button type="button" id="auto-wave-btn" title="Automatically start the next wave after a short delay">AUTO · OFF</button>
    <button type="button" id="lb-btn" title="Top scores (Firebase)">RANKINGS</button>
    <button type="button" id="wave-btn">► SEND WAVE 1</button>
  </div>
  <div id="game-scale-holder">
    <div id="game-scale-clip">
      <div id="game-wrap">
        <div id="game-container">
          <canvas id="gameCanvas" width="1080" height="600"></canvas>
          <div id="overlay">
            <div id="overlay-box">
              <h1 id="overlay-title">VICTORY</h1>
              <p id="overlay-msg">You defended the base!</p>
              <div class="overlay-lb-row" id="overlay-lb-row">
                <input type="text" id="lb-name-input" maxlength="24" placeholder="Display name" autocomplete="off" />
                <button type="button" id="lb-submit-btn">SUBMIT SCORE</button>
                <p class="lb-submit-hint" id="lb-submit-hint"></p>
              </div>
              <button id="restart-btn" onclick="restartGame()">PLAY AGAIN</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="bottom-panel">
    <div id="info-panel">
      <div class="info-title">How to Play</div>
      Pick a tower, then click grass to place.<br>Click a built tower to sell (50% refund).<br>Right-click cancels placement.<br>Towers cannot block the path.
    </div>
  </div>
</div>
</div>

<div id="leaderboard-overlay" class="lb-overlay" aria-hidden="true">
  <div class="lb-panel">
    <h2>TOP SCORES</h2>
    <div class="lb-status" id="lb-fetch-status"></div>
    <ol id="lb-list"></ol>
    <button type="button" id="lb-close">CLOSE</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  ISO TD — Isometric 2.5D Tower Defense
// ═══════════════════════════════════════════════════════════

/** Logical canvas size (all game math uses these). Backing store is scaled by devicePixelRatio. */
const W = 1080, H = 600;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function syncGameCanvasResolution() {
  const dpr = Math.min(Math.max(window.devicePixelRatio || 1, 1), 2.5);
  const bw = Math.round(W * dpr);
  const bh = Math.round(H * dpr);
  if (canvas.width !== bw || canvas.height !== bh) {
    canvas.width = bw;
    canvas.height = bh;
  }
  canvas.style.width = `${W}px`;
  canvas.style.height = `${H}px`;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.imageSmoothingEnabled = true;
  if (typeof ctx.imageSmoothingQuality === 'string') ctx.imageSmoothingQuality = 'high';
}
syncGameCanvasResolution();

function themeKey() {
  return document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
}

const MAP_PALETTE = {
  dark: {
    bg: '#080808',
    grass: ['#121212', '#101010', '#141414', '#0e0e0e'],
    path: '#2c2c2c',
    pathStroke: 'rgba(255,255,255,0.08)',
    pathDot: 'rgba(255,255,255,0.06)',
    startTop: '#2a2424',
    startStroke: 'rgba(255,255,255,0.2)',
    startLabel: '#c0c0c0',
    endTop: '#1e221e',
    endStroke: 'rgba(255,255,255,0.18)',
    endLabel: '#b8b8b8',
    edgePath: '#242424',
    edgeGrass: '#0c0c0c',
    previewOk: 'rgba(200,200,200,0.14)',
    previewOkStroke: 'rgba(220,220,220,0.65)',
    previewBad: 'rgba(100,100,100,0.35)',
    previewBadStroke: 'rgba(80,80,80,0.75)',
    rangeOk: 'rgba(200,200,200,0.22)',
    rangeBad: 'rgba(90,90,90,0.25)',
    hudText: 'rgba(200,200,200,0.5)',
  },
  light: {
    bg: '#d8d8d8',
    grass: ['#c8c8c8', '#cacaca', '#c4c4c4', '#cecece'],
    path: '#a8a8a8',
    pathStroke: 'rgba(0,0,0,0.1)',
    pathDot: 'rgba(0,0,0,0.06)',
    startTop: '#b8b0b0',
    startStroke: 'rgba(0,0,0,0.18)',
    startLabel: '#2a2a2a',
    endTop: '#b0b8b0',
    endStroke: 'rgba(0,0,0,0.16)',
    endLabel: '#2a2a2a',
    edgePath: '#989898',
    edgeGrass: '#bcbcbc',
    previewOk: 'rgba(40,40,40,0.12)',
    previewOkStroke: 'rgba(30,30,30,0.55)',
    previewBad: 'rgba(60,60,60,0.22)',
    previewBadStroke: 'rgba(40,40,40,0.65)',
    rangeOk: 'rgba(40,40,40,0.18)',
    rangeBad: 'rgba(0,0,0,0.15)',
    hudText: 'rgba(40,40,40,0.55)',
  },
};

const MAP_PATH_BY_VARIANT = {
  dark: ['#2c2c2c', '#283236', '#2c2834', '#302e2a'],
  light: ['#a8a8a8', '#9caaa8', '#a89ca4', '#a4a898'],
};

function mapPal() {
  const t = themeKey();
  const P = { ...MAP_PALETTE[t] };
  const v = (typeof state !== 'undefined' && state.mapVariant != null) ? (state.mapVariant % 4) : 0;
  P.path = MAP_PATH_BY_VARIANT[t][v];
  return P;
}

function canvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const sx = (clientX - rect.left) * (W / rect.width);
  const sy = (clientY - rect.top) * (H / rect.height);
  return { sx, sy };
}

function viewportBox() {
  const vv = window.visualViewport;
  if (vv && vv.width > 0 && vv.height > 0) {
    return { w: vv.width, h: vv.height };
  }
  return { w: window.innerWidth, h: window.innerHeight };
}

function fitLayout() {
  const row = document.getElementById('game-scale-holder');
  const clip = document.getElementById('game-scale-clip');
  const gameWrap = document.getElementById('game-wrap');
  if (!row || !clip || !gameWrap) return;

  const gw = row.clientWidth;
  const gh = row.clientHeight;
  if (gw < 1 || gh < 1) return;

  /* Only the canvas strip is scaled; HUD and shop stay 1:1. */
  const margin = 0.995;
  const scaleX = (gw / W) * margin;
  const scaleY = (gh / H) * margin;
  const bw = Math.max(1, Math.floor(W * scaleX));
  const bh = Math.max(1, Math.floor(H * scaleY));

  clip.style.width = `${bw}px`;
  clip.style.height = `${bh}px`;
  gameWrap.style.transform = `scale(${scaleX}, ${scaleY})`;
}

function scheduleFitLayout() {
  requestAnimationFrame(() => {
    syncGameCanvasResolution();
    fitLayout();
    requestAnimationFrame(() => {
      syncGameCanvasResolution();
      fitLayout();
    });
  });
}

function applyTheme(next) {
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('td-theme', next); } catch (e) {}
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = next === 'light' ? 'DARK' : 'LIGHT';
  if (typeof state !== 'undefined' && state) renderTowerPanel();
  scheduleFitLayout();
}

function initTheme() {
  let t = 'dark';
  try { t = localStorage.getItem('td-theme') || 'dark'; } catch (e) {}
  if (t !== 'light' && t !== 'dark') t = 'dark';
  applyTheme(t);
}

document.getElementById('theme-btn').addEventListener('click', () => {
  applyTheme(themeKey() === 'dark' ? 'light' : 'dark');
});

window.addEventListener('resize', scheduleFitLayout);

// ── ISOMETRIC CONFIG ─────────────────────────────────────────
const COLS = 20, ROWS = 12;
const TW = 64, TH = 32;   // tile width / height (2:1 ratio)
// Map spans all corners (c,r) with c in 0..COLS, r in 0..ROWS — center that bbox in the canvas.
const ISO_X_OFF_MIN = (0 - ROWS) * (TW / 2);
const ISO_X_OFF_MAX = COLS * (TW / 2);
const ISO_X_SPAN = ISO_X_OFF_MAX - ISO_X_OFF_MIN;
const ISO_Y_OFF_MAX = (COLS + ROWS) * (TH / 2);

const MAP_PAD = { x: 20, top: 40, bottom: 28 };
const innerW = W - MAP_PAD.x * 2;
const innerH = H - MAP_PAD.top - MAP_PAD.bottom;
const ORIGIN_X = MAP_PAD.x + (innerW - ISO_X_SPAN) / 2 - ISO_X_OFF_MIN;
const ORIGIN_Y = MAP_PAD.top + (innerH - ISO_Y_OFF_MAX) / 2;

// Convert grid (col, row) → screen (px, py)
function isoProject(col, row, z = 0) {
  return {
    x: ORIGIN_X + (col - row) * (TW / 2),
    y: ORIGIN_Y + (col + row) * (TH / 2) - z
  };
}

// Convert screen (mx, my) → nearest grid (col, row)
function screenToGrid(sx, sy) {
  const relX = sx - ORIGIN_X;
  const relY = sy - ORIGIN_Y;
  const col = Math.round((relX / (TW / 2) + relY / (TH / 2)) / 2);
  const row = Math.round((relY / (TH / 2) - relX / (TW / 2)) / 2);
  return { col, row };
}

// ── PATH (procedural per run; fallback = classic layout) ───────
const DEFAULT_PATH_CELLS = [
  {c:0,r:6},{c:1,r:6},{c:2,r:6},{c:3,r:6},{c:4,r:6},
  {c:4,r:5},{c:4,r:4},{c:4,r:3},
  {c:5,r:3},{c:6,r:3},{c:7,r:3},{c:8,r:3},
  {c:8,r:4},{c:8,r:5},{c:8,r:6},{c:8,r:7},{c:8,r:8},
  {c:9,r:8},{c:10,r:8},{c:11,r:8},{c:12,r:8},
  {c:12,r:7},{c:12,r:6},{c:12,r:5},{c:12,r:4},
  {c:13,r:4},{c:14,r:4},{c:15,r:4},{c:16,r:4},
  {c:16,r:5},{c:16,r:6},{c:16,r:7},{c:16,r:8},{c:16,r:9},
  {c:17,r:9},{c:18,r:9},{c:19,r:9}
];

let PATH_CELLS = DEFAULT_PATH_CELLS.map(p => ({ ...p }));
let PATH_SET = new Set(PATH_CELLS.map(p => `${p.c},${p.r}`));

function mulberry32(a) {
  return function () {
    let t = (a += 0x6d2b79f5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/** Orthogonal random walk from west edge to east edge; no revisits. */
function generatePathCells(seed) {
  const rng = mulberry32(seed >>> 0);
  const goalC = COLS - 1;
  for (let attempt = 0; attempt < 120; attempt++) {
    const r0 = 2 + Math.floor(rng() * (ROWS - 4));
    const goalR = 2 + Math.floor(rng() * (ROWS - 4));
    let c = 0, r = r0;
    const cells = [{ c, r }];
    const vis = new Set([`${c},${r}`]);
    let guard = 0;
    while ((c !== goalC || r !== goalR) && guard++ < 800) {
      if (c === goalC && r !== goalR) {
        const step = r < goalR ? 1 : -1;
        const nr = r + step;
        if (nr < 0 || nr >= ROWS || vis.has(`${c},${nr}`)) break;
        r = nr;
        vis.add(`${c},${r}`);
        cells.push({ c, r });
        continue;
      }
      const opts = [];
      if (c + 1 < COLS && !vis.has(`${c + 1},${r}`)) opts.push({ nc: c + 1, nr: r, w: 3.2 + rng() * 0.8 });
      if (c > 0 && !vis.has(`${c - 1},${r}`)) opts.push({ nc: c - 1, nr: r, w: 0.2 + rng() * 0.15 });
      if (r + 1 < ROWS && !vis.has(`${c},${r + 1}`)) {
        const bias = 1 + Math.abs(r + 1 - goalR) * 0.08;
        opts.push({ nc: c, nr: r + 1, w: (0.75 + rng() * 0.4) * bias });
      }
      if (r > 0 && !vis.has(`${c},${r - 1}`)) {
        const bias = 1 + Math.abs(r - 1 - goalR) * 0.08;
        opts.push({ nc: c, nr: r - 1, w: (0.75 + rng() * 0.4) * bias });
      }
      if (opts.length === 0) break;
      let sum = 0;
      for (const o of opts) sum += o.w;
      let pick = rng() * sum;
      let chosen = opts[0];
      for (const o of opts) {
        pick -= o.w;
        if (pick <= 0) {
          chosen = o;
          break;
        }
      }
      c = chosen.nc;
      r = chosen.nr;
      vis.add(`${c},${r}`);
      cells.push({ c, r });
    }
    if (c === goalC && r === goalR && cells.length >= COLS + 8) return cells;
  }
  return null;
}

function rollNewMap() {
  let seed = (Math.floor(Math.random() * 0x7fffffff) ^ Date.now()) >>> 0;
  let path = generatePathCells(seed);
  let tries = 0;
  while (!path && tries++ < 8) {
    seed = (seed * 1664525 + 1013904223) >>> 0;
    path = generatePathCells(seed);
  }
  PATH_CELLS = (path || DEFAULT_PATH_CELLS).map(p => ({ ...p }));
  PATH_SET = new Set(PATH_CELLS.map(p => `${p.c},${p.r}`));
  state.mapSeed = seed;
  state.mapVariant = seed % 4;
}

function grassHash(c, r) {
  const v = (typeof state !== 'undefined' && state.mapVariant != null) ? state.mapVariant : 0;
  return (c * 7 + r * 13 + v * 3) % 4;
}

// Convert path cells to world-space waypoints (center of each tile)
function cellCenter(c, r) {
  return isoProject(c + 0.5, r + 0.5, 0);
}

/** Procedural groups after the fixed tutorial/scripted waves. */
const INF_SWARM = ['grunt', 'runner', 'phantom', 'skimmer', 'fast'];
const INF_BRUTE = ['brute', 'armored', 'tank', 'bulwark'];
const INF_AIR = ['flier', 'darter', 'wraith'];
const INF_ELITE = ['regen', 'brood', 'warchief', 'boss'];

function buildInfiniteWaveGroups(waveIndex) {
  const k = waveIndex - SCRIPTED_WAVES + 1;
  const rng = mulberry32((state.mapSeed ^ 0x9e3779b9) + waveIndex * 0x6a09e667);
  const pick = arr => arr[Math.floor(rng() * arr.length)];
  const nBase = Math.min(48, 10 + k * 2 + Math.floor(rng() * 6));
  const groups = [{ t: pick(INF_SWARM), n: nBase }];
  if (k > 1) groups.push({ t: pick(INF_SWARM), n: Math.min(40, 6 + Math.floor(k * 1.2) + Math.floor(rng() * 5)) });
  if (k > 2) groups.push({ t: pick(INF_BRUTE), n: Math.min(16, 2 + Math.floor(k / 4) + Math.floor(rng() * 3)) });
  if (k > 4) groups.push({ t: pick(INF_AIR), n: Math.min(22, 4 + Math.floor(k / 2) + Math.floor(rng() * 4)) });
  if (k > 6) groups.push({ t: pick(['regen', 'brood']), n: Math.min(12, 2 + Math.floor(k / 5) + Math.floor(rng() * 2)) });
  if (k > 8) groups.push({ t: pick(INF_BRUTE), n: Math.min(10, 1 + Math.floor(k / 6) + Math.floor(rng() * 2)) });
  if (k > 10) groups.push({ t: pick(INF_AIR), n: Math.min(18, 4 + Math.floor(k / 3) + Math.floor(rng() * 3)) });
  if (k > 12 && k % 4 === 0) groups.push({ t: 'warchief', n: Math.min(3, 1 + Math.floor(k / 20)) });
  if (k > 14 && k % 5 === 0) groups.push({ t: 'boss', n: Math.min(4, 1 + Math.floor(k / 18)) });
  if (k > 20 && rng() > 0.65) groups.push({ t: pick(INF_ELITE), n: Math.min(6, 1 + Math.floor(rng() * 3)) });
  return groups;
}

function getWaveGroupsAt(waveIndex) {
  if (waveIndex < SCRIPTED_WAVES) return WAVE_SCRIPT[waveIndex];
  return buildInfiniteWaveGroups(waveIndex);
}

/** Tower available once `state.wave >= unlockWave` (wave counter updates when a wave is sent). */
function isTowerUnlocked(key) {
  const uw = TOWER_DEFS[key].unlockWave ?? 0;
  return state.wave >= uw;
}

function clearAutoSendTimeout() {
  if (state._autoSendTimeoutId != null) {
    clearTimeout(state._autoSendTimeoutId);
    state._autoSendTimeoutId = null;
  }
}

function scheduleAutoSendWave(delayMs = 1450) {
  if (!state.autoSendWaves) return;
  clearAutoSendTimeout();
  state._autoSendTimeoutId = setTimeout(() => {
    state._autoSendTimeoutId = null;
    if (state.phase === 'prep') sendWave();
  }, delayMs);
}

// ── STATE ────────────────────────────────────────────────────────
let state = {}, speedMult = 1;

function makeState() {
  return {
    gold:195, lives:20, wave:0, score:0, kills:0,
    phase:'prep',
    towers:[], enemies:[], projectiles:[], particles:[], floaters:[],
    placing:null, mouseCol:-1, mouseRow:-1,
    spawnQueue:[], spawnElapsed:0,
    mapSeed:0, mapVariant:0,
    autoSendWaves: false,
    _autoSendTimeoutId: null,
  };
}

function restartGame() {
  clearAutoSendTimeout();
  closeLeaderboardPanel();
  state = makeState();
  rollNewMap();
  document.getElementById('overlay').classList.remove('show');
  speedMult = 1;
  document.getElementById('speed-btn').textContent = '2× SPEED';
  renderTowerPanel(); updateHUD();
  scheduleFitLayout();
}

// ── HUD ──────────────────────────────────────────────────────────
const MAP_FIELD_NAMES = ['Ash', 'Moss', 'Slate', 'Dune'];

function updateHUD() {
  document.getElementById('hud-gold').textContent  = state.gold;
  document.getElementById('hud-lives').textContent = state.lives;
  document.getElementById('hud-wave').textContent  = `${state.wave}\u00a0/\u00a0∞`;
  const hm = document.getElementById('hud-map');
  if (hm) hm.textContent = MAP_FIELD_NAMES[state.mapVariant % 4] || '—';
  document.getElementById('hud-score').textContent = state.score;
  document.getElementById('hud-kills').textContent = state.kills;
  const wb = document.getElementById('wave-btn');
  if (state.phase==='combat') { wb.disabled=true; wb.textContent=`WAVE ${state.wave} IN PROGRESS`; }
  else { wb.disabled=false; wb.textContent=`► SEND WAVE ${state.wave + 1}`; }
  const ab = document.getElementById('auto-wave-btn');
  if (ab) {
    ab.classList.toggle('active', state.autoSendWaves);
    ab.textContent = state.autoSendWaves ? 'AUTO · ON' : 'AUTO · OFF';
  }
}

// ── TOWER PANEL ──────────────────────────────────────────────────
function renderTowerPanel() {
  if (state.placing && !isTowerUnlocked(state.placing)) state.placing = null;
  const panel = document.getElementById('bottom-panel');
  panel.querySelectorAll('.tower-card').forEach(e=>e.remove());
  const info = document.getElementById('info-panel');
  const towerKeys = Object.keys(TOWER_DEFS).sort((a, b) => {
    const da = TOWER_DEFS[a], db = TOWER_DEFS[b];
    if (da.unlockWave !== db.unlockWave) return da.unlockWave - db.unlockWave;
    return da.cost - db.cost;
  });
  towerKeys.forEach(key => {
    const def = TOWER_DEFS[key];
    const unlocked = isTowerUnlocked(key);
    const uwave = def.unlockWave ?? 0;
    const card = document.createElement('div');
    card.className = 'tower-card'
      + (state.placing === key ? ' selected' : '')
      + (!unlocked ? ' locked' : '')
      + (unlocked && state.gold < def.cost ? ' unaffordable' : '');
    const iconLogical = 44;
    const idpr = Math.min(window.devicePixelRatio || 1, 2);
    const mc = document.createElement('canvas');
    mc.width = Math.round(iconLogical * idpr);
    mc.height = Math.round(iconLogical * idpr);
    mc.style.width = `${iconLogical}px`;
    mc.style.height = `${iconLogical}px`;
    const mctx = mc.getContext('2d');
    mctx.setTransform(idpr, 0, 0, idpr, 0, 0);
    mctx.imageSmoothingEnabled = true;
    if (typeof mctx.imageSmoothingQuality === 'string') mctx.imageSmoothingQuality = 'high';
    drawTowerIconCanvas(mctx, 22, 34, key);
    card.appendChild(mc);
    const nm = document.createElement('div'); nm.className = 't-name'; nm.textContent = def.name; card.appendChild(nm);
    const co = document.createElement('div'); co.className = 't-cost';
    co.textContent = unlocked ? `⬡ ${def.cost}` : '—';
    card.appendChild(co);
    const st = document.createElement('div'); st.className = 't-stats';
    if (unlocked) st.textContent = `DMG ${def.dmg}  RNG ${def.range}`;
    else {
      st.className = 't-stats t-lock';
      st.textContent = uwave <= 0 ? 'LOCKED' : `WAVE ${uwave}+`;
    }
    card.appendChild(st);
    card.addEventListener('click', () => {
      if (!unlocked) {
        info.innerHTML = `<div class="info-title">${def.name}</div>Locked until <b>wave ${uwave}</b> starts (after wave ${Math.max(0, uwave - 1)}).<br><br>${def.desc}`;
        return;
      }
      if (state.gold < def.cost) return;
      state.placing = (state.placing === key) ? null : key;
      renderTowerPanel();
      info.innerHTML = state.placing
        ? `<div class="info-title">${def.name}</div>Cost: ⬡ ${def.cost}<br>Dmg: ${def.dmg} | Rng: ${def.range}<br>Rate: ${def.rate}/s<br><br>${def.desc}`
        : `<div class="info-title">How to Play</div>Pick a tower, then click grass to place.<br>Click a built tower to sell (50% refund).<br>Right-click cancels placement.<br>Towers cannot block the path.`;
    });
    panel.insertBefore(card, info);
  });
}

// ── ISO DRAWING PRIMITIVES ───────────────────────────────────────

// Draw an isometric tile face (top of tile)
function drawIsoTileTop(c, col, row, fill, stroke, alpha=1) {
  const p = isoProject(col, row);
  const r = isoProject(col+1, row);
  const b = isoProject(col+1, row+1);
  const l = isoProject(col, row+1);
  c.save(); c.globalAlpha = alpha;
  c.beginPath();
  c.moveTo(p.x, p.y); c.lineTo(r.x, r.y); c.lineTo(b.x, b.y); c.lineTo(l.x, l.y);
  c.closePath();
  c.fillStyle = fill; c.fill();
  if (stroke) { c.strokeStyle = stroke; c.lineWidth = 0.5; c.stroke(); }
  c.restore();
}

// Draw isometric box (top + right side + left side)
function drawIsoBox(c, cx, cy, w, d, h, topColor, leftColor, rightColor, strokeColor) {
  // cx,cy = screen center of top face, w=width, d=depth, h=height in screen px
  const hw = w/2, hd = d/2;
  // Top face (diamond)
  c.beginPath();
  c.moveTo(cx,     cy-hd);
  c.lineTo(cx+hw,  cy);
  c.lineTo(cx,     cy+hd);
  c.lineTo(cx-hw,  cy);
  c.closePath();
  c.fillStyle = topColor; c.fill();
  if (strokeColor) { c.strokeStyle = strokeColor; c.lineWidth = 0.5; c.stroke(); }
  // Left face (parallelogram going down-left)
  c.beginPath();
  c.moveTo(cx-hw, cy);
  c.lineTo(cx,    cy+hd);
  c.lineTo(cx,    cy+hd+h);
  c.lineTo(cx-hw, cy+h);
  c.closePath();
  c.fillStyle = leftColor; c.fill();
  if (strokeColor) { c.strokeStyle = strokeColor; c.lineWidth = 0.5; c.stroke(); }
  // Right face (parallelogram going down-right)
  c.beginPath();
  c.moveTo(cx,    cy+hd);
  c.lineTo(cx+hw, cy);
  c.lineTo(cx+hw, cy+h);
  c.lineTo(cx,    cy+hd+h);
  c.closePath();
  c.fillStyle = rightColor; c.fill();
  if (strokeColor) { c.strokeStyle = strokeColor; c.lineWidth = 0.5; c.stroke(); }
}

function towerSpriteReady(key) {
  const im = towerSpriteCache[key];
  return im && im.complete && im.naturalWidth > 0;
}

function drawTowerWithSprite(c, screenX, screenY, key) {
  const def = TOWER_DEFS[key];
  const img = towerSpriteCache[key];
  const hMul = def.towerSpriteHeightMul ?? 1.38;
  const hDraw = TH * hMul;
  const scale = hDraw / img.naturalHeight;
  const wDraw = img.naturalWidth * scale;
  const feetN = def.towerSpriteFeetNorm ?? 0.05;
  const bottomY = screenY + feetN * hDraw;
  const dx = screenX - wDraw / 2;
  const dy = bottomY - hDraw;

  c.save();
  c.globalAlpha = 0.22;
  c.fillStyle = '#000';
  c.beginPath();
  c.ellipse(screenX, screenY + TH * 0.06, TW * 0.2, TH * 0.14, 0, 0, Math.PI * 2);
  c.fill();
  c.restore();

  c.drawImage(img, dx, dy, wDraw, hDraw);
}

// Draw a 3D isometric tower on a tile (vector fallback)
function drawIsoTowerVector(c, screenX, screenY, key) {
  const def = TOWER_DEFS[key];
  const tw = TW*0.7, td = TH*0.7;

  // Base platform
  drawIsoBox(c, screenX, screenY - TH*0.1,
    tw, td, TH*0.35,
    darken(def.topColor, 15), darken(def.sideColor, 20), darken(def.sideColor, 10),
    'rgba(0,0,0,0.25)'
  );

  // Tower body (taller block on top)
  const bodyY = screenY - TH*0.1 - TH*0.35;
  drawIsoBox(c, screenX, bodyY,
    tw*0.65, td*0.65, TH*0.5,
    def.topColor, darken(def.topColor, 30), darken(def.topColor, 20),
    'rgba(0,0,0,0.2)'
  );

  // Accent / barrel / type-specific top
  const topY = bodyY - TH*0.5;
  const ax = screenX, ay = topY;
  const topStyle = def.towerTop || key;

  switch(topStyle) {
    case 'cannon':
      // Barrel pointing right-iso
      c.save();
      c.fillStyle = def.accentColor;
      c.beginPath();
      c.ellipse(ax, ay, tw*0.22, td*0.22, 0, 0, Math.PI*2);
      c.fill();
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(ax+tw*0.08, ay-td*0.06, tw*0.07, 0, Math.PI*2); c.fill();
      // barrel stick
      c.fillStyle = def.accentColor;
      c.beginPath();
      c.moveTo(ax+tw*0.15, ay-2); c.lineTo(ax+tw*0.44, ay-4); c.lineTo(ax+tw*0.44, ay+3); c.lineTo(ax+tw*0.15, ay+3);
      c.fill();
      c.restore();
      break;
    case 'sniper':
      c.save();
      c.fillStyle = def.accentColor;
      c.beginPath(); c.ellipse(ax, ay, tw*0.2, td*0.2, 0, 0, Math.PI*2); c.fill();
      // long barrel
      c.fillStyle = '#e0baff';
      c.beginPath(); c.moveTo(ax+tw*0.12, ay-2); c.lineTo(ax+tw*0.55, ay-3); c.lineTo(ax+tw*0.55, ay+2); c.lineTo(ax+tw*0.12, ay+2); c.fill();
      // scope
      c.fillStyle = '#fff'; c.beginPath(); c.arc(ax+tw*0.5, ay-4, 4, 0, Math.PI*2); c.fill();
      c.restore();
      break;
    case 'mortar':
      c.save();
      c.fillStyle = def.accentColor;
      c.beginPath(); c.roundRect(ax-tw*0.18, ay-td*0.22, tw*0.36, td*0.44, 3); c.fill();
      // barrel (pointing up)
      c.fillStyle = darken(def.topColor, 10);
      c.beginPath(); c.ellipse(ax, ay, tw*0.11, td*0.11, 0, 0, Math.PI*2); c.fill();
      c.restore();
      break;
    case 'ice':
      // Crystal spikes
      c.save();
      for(let i=0;i<6;i++){
        const a = i*Math.PI/3;
        const sx = ax+Math.cos(a)*tw*0.28, sy = ay+Math.sin(a)*td*0.28*0.5;
        c.fillStyle = def.accentColor;
        c.beginPath(); c.moveTo(ax,ay); c.lineTo(sx-3,sy); c.lineTo(sx,sy-6); c.lineTo(sx+3,sy); c.fill();
      }
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(ax, ay, tw*0.12, 0, Math.PI*2); c.fill();
      c.restore();
      break;
    case 'laser':
      c.save();
      c.fillStyle = def.accentColor;
      c.beginPath(); c.arc(ax, ay, tw*0.22, 0, Math.PI*2); c.fill();
      c.fillStyle = '#fff'; c.beginPath(); c.arc(ax, ay, tw*0.1, 0, Math.PI*2); c.fill();
      // beam nozzle
      c.fillStyle = def.projColor;
      c.beginPath(); c.moveTo(ax+tw*0.1, ay-2); c.lineTo(ax+tw*0.5, ay-3); c.lineTo(ax+tw*0.5, ay+3); c.lineTo(ax+tw*0.1, ay+2); c.fill();
      c.restore();
      break;
    default:
      c.save();
      c.fillStyle = def.accentColor;
      c.beginPath();
      c.ellipse(ax, ay, tw*0.22, td*0.22, 0, 0, Math.PI*2);
      c.fill();
      c.restore();
      break;
  }
}

function drawIsoTower(c, screenX, screenY, key) {
  if (towerSpriteReady(key)) {
    drawTowerWithSprite(c, screenX, screenY, key);
    return;
  }
  drawIsoTowerVector(c, screenX, screenY, key);
}

function drawTowerIconVector(c, cx, cy, key) {
  const def = TOWER_DEFS[key];
  drawIsoBox(c, cx, cy-2, 32, 16, 10, darken(def.topColor,10), darken(def.sideColor,20), darken(def.sideColor,10), 'rgba(0,0,0,0.3)');
  drawIsoBox(c, cx, cy-12, 22, 11, 13, def.topColor, darken(def.topColor,30), darken(def.topColor,20), 'rgba(0,0,0,0.2)');
}

// Shop / panel icon (uses same PNGs when loaded)
function drawTowerIconCanvas(c, cx, cy, key) {
  if (towerSpriteReady(key)) {
    const img = towerSpriteCache[key];
    const maxS = 36;
    const sc = Math.min(maxS / img.naturalWidth, maxS / img.naturalHeight);
    const wD = img.naturalWidth * sc;
    const hD = img.naturalHeight * sc;
    c.drawImage(img, cx - wD / 2, cy - hD / 2, wD, hD);
    return;
  }
  drawTowerIconVector(c, cx, cy, key);
}

function enemySpriteReady(type) {
  const im = enemySpriteCache[type];
  return im && im.complete && im.naturalWidth > 0;
}

function drawEnemyWithSprite(c, enemy, img) {
  const def = ENEMY_DEFS[enemy.type];
  const sx = enemy.sx, sy = enemy.sy;
  const r = def.size * TW * 0.5;
  const rh = r * 0.5;
  c.save();
  c.globalAlpha = 0.35;
  c.fillStyle = '#000';
  c.beginPath();
  c.ellipse(sx, sy, r * 0.85, rh * 0.5, 0, 0, Math.PI * 2);
  c.fill();
  c.restore();

  const mul = def.spriteHeightMul ?? 1.45;
  const hDraw = def.size * TW * mul;
  const scale = hDraw / img.naturalHeight;
  const wDraw = img.naturalWidth * scale;
  const feetN = def.spriteFeetNorm ?? 0;
  const bottomY = sy + feetN * hDraw;
  const dx = sx - wDraw / 2;
  const dy = bottomY - hDraw;

  if (def.flying) {
    c.save();
    c.globalAlpha = 0.3;
    c.strokeStyle = '#fff';
    c.lineWidth = 0.5;
    c.setLineDash([3, 3]);
    c.beginPath();
    c.moveTo(sx, bottomY);
    c.lineTo(sx, sy);
    c.stroke();
    c.setLineDash([]);
    c.restore();
  }

  c.save();
  if (enemy.slowTimer > 0) {
    c.shadowColor = '#67e8f9';
    c.shadowBlur = 14;
  }
  c.drawImage(img, dx, dy, wDraw, hDraw);
  c.restore();

  const bw = Math.max(wDraw * 0.85, r * 2.2);
  const bh = 3.5;
  const bx = sx - bw / 2;
  const by = dy - 9;
  c.fillStyle = 'rgba(0,0,0,0.55)';
  c.beginPath();
  c.roundRect(bx, by, bw, bh, 2);
  c.fill();
  const pct = enemy.hp / enemy.maxHp;
  c.fillStyle = pct > 0.6 ? '#4ade80' : pct > 0.3 ? '#facc15' : '#f87171';
  c.beginPath();
  c.roundRect(bx, by, bw * pct, bh, 2);
  c.fill();
}

// Vector fallback (procedural) when PNG not loaded or missing
function drawIsoEnemyVector(c, enemy) {
  const def = ENEMY_DEFS[enemy.type];
  const sx = enemy.sx, sy = enemy.sy;
  const r = def.size * TW * 0.5;
  const rh = r * 0.5;  // iso height factor
  const h = r * 1.1;   // vertical height of body

  // Shadow ellipse on ground
  c.save(); c.globalAlpha = 0.35;
  c.fillStyle = '#000';
  c.beginPath(); c.ellipse(sx, sy, r*0.85, rh*0.5, 0, 0, Math.PI*2); c.fill();
  c.restore();

  const bodyColor = enemy.slowTimer > 0 ? '#3dd8e8' : def.color;
  const sideBodyColor = enemy.slowTimer > 0 ? '#1a8fa0' : def.sideColor;

  if (def.render === 'boss') {
    // Hexagonal prism
    const pts = [];
    for(let i=0;i<6;i++){
      const a = i*Math.PI/3;
      pts.push({x: sx+Math.cos(a)*r, y: sy+Math.sin(a)*rh});
    }
    // Bottom (shifted down by h)
    const ptsB = pts.map(p=>({x:p.x, y:p.y+h}));
    // Side faces
    for(let i=0;i<6;i++){
      const n = (i+1)%6;
      c.beginPath();
      c.moveTo(pts[i].x, pts[i].y); c.lineTo(pts[n].x, pts[n].y);
      c.lineTo(ptsB[n].x, ptsB[n].y); c.lineTo(ptsB[i].x, ptsB[i].y);
      c.closePath();
      c.fillStyle = i<3 ? darken(sideBodyColor,10) : sideBodyColor;
      c.fill(); c.strokeStyle='rgba(0,0,0,0.2)'; c.lineWidth=0.5; c.stroke();
    }
    // Top face
    c.beginPath(); pts.forEach((p,i)=>i?c.lineTo(p.x,p.y):c.moveTo(p.x,p.y)); c.closePath();
    c.fillStyle = bodyColor; c.fill(); c.strokeStyle='rgba(255,255,255,0.2)'; c.lineWidth=1; c.stroke();
    // Inner rune on top
    c.strokeStyle='rgba(255,255,255,0.4)'; c.lineWidth=0.8;
    c.beginPath(); c.arc(sx, sy, r*0.45, 0, Math.PI*2); c.stroke();
  } else if (def.render === 'flier') {
    // Diamond elevated (floating)
    const fy = sy - h*0.7;
    c.fillStyle = bodyColor;
    c.beginPath(); c.moveTo(sx, fy-r*0.9); c.lineTo(sx+r*0.8, fy); c.lineTo(sx, fy+r*0.6); c.lineTo(sx-r*0.8, fy); c.closePath(); c.fill();
    c.strokeStyle = def.sideColor; c.lineWidth = 1; c.stroke();
    // Wings
    c.fillStyle = 'rgba(6,182,212,0.35)';
    c.beginPath(); c.ellipse(sx-r*1.5, fy-r*0.2, r*1.0, r*0.3, -0.35, 0, Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(sx+r*1.5, fy-r*0.2, r*1.0, r*0.3, 0.35, 0, Math.PI*2); c.fill();
    // Dashed line to ground
    c.save(); c.globalAlpha=0.3; c.strokeStyle='#fff'; c.lineWidth=0.5; c.setLineDash([3,3]);
    c.beginPath(); c.moveTo(sx, fy+r*0.6); c.lineTo(sx, sy); c.stroke(); c.setLineDash([]); c.restore();
  } else {
    // Generic cylinder enemy
    // Side band
    c.beginPath();
    c.moveTo(sx-r, sy); c.lineTo(sx-r, sy+h*0.6);
    c.arc(sx, sy+h*0.6, r, Math.PI, 0, false);
    c.lineTo(sx+r, sy); c.arc(sx, sy, r, 0, Math.PI, true);
    c.closePath();
    c.fillStyle = sideBodyColor; c.fill();
    // Top ellipse
    c.beginPath(); c.ellipse(sx, sy, r, rh, 0, 0, Math.PI*2);
    c.fillStyle = bodyColor; c.fill(); c.strokeStyle='rgba(255,255,255,0.15)'; c.lineWidth=0.5; c.stroke();
    // Eye on top
    if (def.render !== 'armored') {
      c.fillStyle = '#fff'; c.beginPath(); c.ellipse(sx+r*0.3, sy-rh*0.3, r*0.28, rh*0.28, 0, 0, Math.PI*2); c.fill();
      c.fillStyle = '#111'; c.beginPath(); c.arc(sx+r*0.35, sy-rh*0.25, r*0.14, 0, Math.PI*2); c.fill();
    }
  }

  // Health bar (always on top)
  const bw = r*2.2, bh = 3.5, bx = sx-bw/2, by = sy - h - r*0.5 - 8;
  c.fillStyle='rgba(0,0,0,0.55)'; c.beginPath(); c.roundRect(bx,by,bw,bh,2); c.fill();
  const pct = enemy.hp/enemy.maxHp;
  c.fillStyle = pct>0.6?'#4ade80':pct>0.3?'#facc15':'#f87171';
  c.beginPath(); c.roundRect(bx,by,bw*pct,bh,2); c.fill();
}

function drawIsoEnemy(c, enemy) {
  if (enemySpriteReady(enemy.type)) {
    drawEnemyWithSprite(c, enemy, enemySpriteCache[enemy.type]);
    return;
  }
  drawIsoEnemyVector(c, enemy);
}

// All (col,row) that can intersect the canvas — extends grass to the edges (visual only).
function visibleGridRange() {
  const pad = 12;
  const samples = [];
  const step = Math.max(64, Math.floor(Math.min(W, H) / 6));
  for (let x = 0; x <= W; x += step) {
    samples.push(screenToGrid(x, 0), screenToGrid(x, H));
  }
  for (let y = 0; y <= H; y += step) {
    samples.push(screenToGrid(0, y), screenToGrid(W, y));
  }
  samples.push(screenToGrid(-80, -80), screenToGrid(W + 80, H + 80));
  let minC = Infinity, maxC = -Infinity, minR = Infinity, maxR = -Infinity;
  for (const g of samples) {
    minC = Math.min(minC, g.col);
    maxC = Math.max(maxC, g.col);
    minR = Math.min(minR, g.row);
    maxR = Math.max(maxR, g.row);
  }
  return {
    minC: minC - pad,
    maxC: maxC + pad,
    minR: minR - pad,
    maxR: maxR + pad,
  };
}

// ── TERRAIN / MAP DRAWING ────────────────────────────────────────
function drawMap() {
  const P = mapPal();
  ctx.fillStyle = P.bg;
  ctx.fillRect(0, 0, W, H);

  const { minC, maxC, minR, maxR } = visibleGridRange();
  const tiles = [];
  for (let r = minR; r <= maxR; r++) {
    for (let c = minC; c <= maxC; c++) tiles.push({ c, r });
  }
  tiles.sort((a, b) => (a.c + a.r) - (b.c + b.r));

  const strokeGrass = themeKey() === 'light' ? 'rgba(0,0,0,0.04)' : 'rgba(255,255,255,0.04)';

  function isoTileOnCanvas(c, r) {
    const p = isoProject(c, r), q = isoProject(c + 1, r), t = isoProject(c + 1, r + 1), s = isoProject(c, r + 1);
    const minX = Math.min(p.x, q.x, t.x, s.x) - 4, maxX = Math.max(p.x, q.x, t.x, s.x) + 4;
    const minY = Math.min(p.y, q.y, t.y, s.y) - 4, maxY = Math.max(p.y, q.y, t.y, s.y) + 4;
    return !(maxX < 0 || minX > W || maxY < 0 || minY > H);
  }

  tiles.forEach(({ c, r }) => {
    if (!isoTileOnCanvas(c, r)) return;
    const inPlay = c >= 0 && c < COLS && r >= 0 && r < ROWS;
    let topColor, strokeColor;

    if (inPlay) {
      const isPath = PATH_SET.has(`${c},${r}`);
      const isStart = c === PATH_CELLS[0].c && r === PATH_CELLS[0].r;
      const isEnd = c === PATH_CELLS[PATH_CELLS.length - 1].c && r === PATH_CELLS[PATH_CELLS.length - 1].r;
      if (isStart) { topColor = P.startTop; strokeColor = P.startStroke; }
      else if (isEnd) { topColor = P.endTop; strokeColor = P.endStroke; }
      else if (isPath) { topColor = P.path; strokeColor = P.pathStroke; }
      else {
        topColor = P.grass[grassHash(c, r)];
        strokeColor = strokeGrass;
      }
    } else {
      topColor = P.grass[grassHash(c, r)];
      strokeColor = strokeGrass;
    }

    drawIsoTileTop(ctx, c, r, topColor, strokeColor);

    if (!inPlay) return;

    const isPath = PATH_SET.has(`${c},${r}`);
    const isStart = c === PATH_CELLS[0].c && r === PATH_CELLS[0].r;
    const isEnd = c === PATH_CELLS[PATH_CELLS.length - 1].c && r === PATH_CELLS[PATH_CELLS.length - 1].r;

    if (isPath && !isStart && !isEnd) {
      const p = isoProject(c + 0.5, r + 0.5);
      ctx.save();
      ctx.fillStyle = P.pathDot;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    if (isStart) {
      const p = isoProject(c + 0.5, r + 0.5);
      ctx.save(); ctx.fillStyle = P.startLabel; ctx.font = 'bold 9px Share Tech Mono'; ctx.textAlign = 'center';
      ctx.fillText('START', p.x, p.y + 3); ctx.restore();
    }
    if (isEnd) {
      const p = isoProject(c + 0.5, r + 0.5);
      ctx.save(); ctx.fillStyle = P.endLabel; ctx.font = 'bold 9px Share Tech Mono'; ctx.textAlign = 'center';
      ctx.fillText('BASE', p.x, p.y + 3); ctx.restore();
    }
  });
}

// ── PLACEMENT PREVIEW ────────────────────────────────────────────
function drawPlacementPreview() {
  if (!state.placing) return;
  const P = mapPal();
  const c = state.mouseCol, r = state.mouseRow;
  if (c<0||r<0||c>=COLS||r>=ROWS) return;
  const valid = !PATH_SET.has(`${c},${r}`) && !isOccupied(c,r);
  const p = isoProject(c+0.5, r+0.5);

  // Highlight tile
  const tl = isoProject(c,r), tr=isoProject(c+1,r), br=isoProject(c+1,r+1), bl=isoProject(c,r+1);
  ctx.save();
  ctx.beginPath(); ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y); ctx.lineTo(br.x,br.y); ctx.lineTo(bl.x,bl.y); ctx.closePath();
  ctx.fillStyle = valid ? P.previewOk : P.previewBad;
  ctx.fill();
  ctx.strokeStyle = valid ? P.previewOkStroke : P.previewBadStroke;
  ctx.lineWidth = 1.2; ctx.stroke();

  // Range ring (approximate circle in iso space)
  const def = TOWER_DEFS[state.placing];
  const rangePx = def.range * TW * 0.5;
  ctx.beginPath();
  // Approximate isometric ellipse for range
  ctx.ellipse(p.x, p.y, rangePx, rangePx*0.5, 0, 0, Math.PI*2);
  ctx.strokeStyle = valid ? P.rangeOk : P.rangeBad;
  ctx.lineWidth = 1; ctx.setLineDash([5,4]); ctx.stroke(); ctx.setLineDash([]);

  // Ghost tower
  ctx.globalAlpha = 0.6;
  drawIsoTower(ctx, p.x, p.y - TH*0.25, state.placing);
  ctx.restore();
}

function drawRemovalPreview() {
  if (state.placing || state.phase === 'gameover') return;
  const c = state.mouseCol, r = state.mouseRow;
  if (c < 0 || r < 0 || c >= COLS || r >= ROWS) return;
  if (PATH_SET.has(`${c},${r}`) || !isOccupied(c, r)) return;
  const tl = isoProject(c, r), tr = isoProject(c + 1, r), br = isoProject(c + 1, r + 1), bl = isoProject(c, r + 1);
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y); ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y); ctx.closePath();
  ctx.fillStyle = themeKey() === 'light' ? 'rgba(180,60,60,0.22)' : 'rgba(220,80,80,0.2)';
  ctx.fill();
  ctx.strokeStyle = themeKey() === 'light' ? 'rgba(140,40,40,0.55)' : 'rgba(255,120,120,0.45)';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  ctx.restore();
}

// ── RENDER LOOP (painter's sort) ─────────────────────────────────
function render() {
  ctx.clearRect(0,0,W,H);
  drawMap();

  // Collect all "sprites" and sort by depth (col+row for grid-aligned, or approx for enemies)
  const sprites = [];

  // Towers
  state.towers.forEach(t => {
    sprites.push({ depth: t.col+t.row+0.5, type:'tower', obj:t });
  });

  // Enemies
  state.enemies.forEach(e => {
    sprites.push({ depth: e.gc+e.gr, type:'enemy', obj:e });
  });

  // Sort back-to-front
  sprites.sort((a,b)=>a.depth-b.depth);

  // Placement / sell preview (on tiles, under sprites)
  drawPlacementPreview();
  drawRemovalPreview();

  // Draw sorted sprites
  sprites.forEach(s => {
    if (s.type==='tower') {
      const t = s.obj;
      const p = isoProject(t.col+0.5, t.row+0.5);
      ctx.save();
      if (t.fireFlash>0) {
        ctx.shadowColor = TOWER_DEFS[t.key].accentColor;
        ctx.shadowBlur = 16;
      }
      drawIsoTower(ctx, p.x, p.y - TH*0.25, t.key);
      ctx.restore();
    } else if (s.type==='enemy') {
      drawIsoEnemy(ctx, s.obj);
    }
  });

  // Projectiles
  state.projectiles.forEach(p => drawProjectile(ctx, p));

  // Particles
  state.particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life/p.maxLife;
    if (p.type==='splash') {
      ctx.beginPath(); ctx.ellipse(p.x, p.y, p.size, p.size*0.5, 0, 0, Math.PI*2);
      ctx.strokeStyle=p.color; ctx.lineWidth=2; ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fillStyle=p.color; ctx.fill();
    }
    ctx.restore();
  });

  // Floaters
  ctx.save();
  ctx.font = 'bold 11px Share Tech Mono';
  ctx.textAlign = 'center';
  state.floaters.forEach(f => {
    ctx.globalAlpha = Math.min(1, f.life*2);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  });
  ctx.restore();

  // Status overlay
  if (state.phase==='combat') {
    const rem = state.enemies.length+state.spawnQueue.length;
    ctx.save(); ctx.font='11px Share Tech Mono'; ctx.fillStyle=mapPal().hudText; ctx.textAlign='right';
    ctx.fillText(`Enemies: ${rem}`, W-10, 18); ctx.restore();
  }
}

// ── PROJECTILE DRAWING ────────────────────────────────────────────
function drawProjectile(c, proj) {
  const def = TOWER_DEFS[proj.towerKey];
  c.save();
  if (TOWER_DEFS[proj.towerKey]?.beam) {
    c.globalAlpha = proj.alpha||0;
    c.beginPath(); c.moveTo(proj.ox, proj.oy); c.lineTo(proj.x, proj.y);
    c.strokeStyle=def.projColor; c.lineWidth=2; c.stroke();
  } else {
    c.beginPath(); c.arc(proj.x, proj.y, def.projSize, 0, Math.PI*2);
    c.fillStyle=def.projColor; c.fill();
  }
  c.restore();
}

// ── PATH / PLACEMENT HELPERS ──────────────────────────────────────
/** Gold returned when removing a tower (fraction of build cost). */
const SELL_REFUND_RATIO = 0.5;

function isOccupied(col, row) {
  return state.towers.some(t=>t.col===col && t.row===row);
}

function towerIndexAt(col, row) {
  return state.towers.findIndex(t => t.col === col && t.row === row);
}

function removeTowerAt(col, row) {
  if (state.phase === 'gameover') return;
  if (col < 0 || row < 0 || col >= COLS || row >= ROWS) return;
  const i = towerIndexAt(col, row);
  if (i < 0) return;
  const t = state.towers[i];
  const def = TOWER_DEFS[t.key];
  const refund = Math.max(0, Math.floor((def.cost || 0) * SELL_REFUND_RATIO));
  state.gold += refund;
  state.towers.splice(i, 1);
  const p = isoProject(col + 0.5, row + 0.5);
  if (refund > 0) addFloater(`+${refund}⬡ sell`, p.x, p.y - TH * 0.5, '#94d4a4');
  renderTowerPanel();
  updateHUD();
}

// Grid distance used for range check
function gridDist(col, row, ec, er) {
  const p1 = isoProject(col+0.5, row+0.5);
  const p2 = isoProject(ec, er);
  return Math.hypot(p1.x-p2.x, p1.y-p2.y) / (TW*0.5);
}

// ── PLACE TOWER ───────────────────────────────────────────────────
function placeTower(col, row) {
  if (!state.placing) return;
  if (!isTowerUnlocked(state.placing)) return;
  if (col<0||row<0||col>=COLS||row>=ROWS) return;
  const def = TOWER_DEFS[state.placing];
  if (state.gold<def.cost) return;
  if (PATH_SET.has(`${col},${row}`)) return;
  if (isOccupied(col, row)) return;
  state.gold -= def.cost;
  state.towers.push({ col, row, key:state.placing, cooldown:0, totalCooldown:1/def.rate, fireFlash:0 });
  state.placing = null;
  renderTowerPanel(); updateHUD();
}

// ── WAVE / SPAWNING ───────────────────────────────────────────────
function sendWave() {
  if (state.phase!=='prep') return;
  const script = getWaveGroupsAt(state.wave);
  if (!script || !script.length) return;
  state.wave++; state.phase='combat'; state.spawnQueue=[]; state.spawnElapsed=0;
  let delay=0;
  script.forEach(group=>{
    for(let i=0;i<group.n;i++){ state.spawnQueue.push({type:group.t,delay}); delay+=700/speedMult; }
    delay+=600/speedMult;
  });
  updateHUD();
}

function spawnEnemy(type) {
  const def = ENEMY_DEFS[type];
  /* Slower HP ramp early (was 0.15 per wave) — waves 1–3 stay closer to base stats. */
  let scale = 1 + Math.max(0, state.wave - 1) * 0.085;
  /* First wave only: softer targets so you can learn placement with one cheap tower. */
  const firstWaveTutorial = state.wave === 1;
  if (firstWaveTutorial) scale *= 0.75;
  const spdMul = firstWaveTutorial ? 0.9 : 1;
  const start = cellCenter(PATH_CELLS[0].c, PATH_CELLS[0].r);
  state.enemies.push({
    type, hp:def.hp*scale, maxHp:def.hp*scale, spd:def.spd*spdMul,
    gold:def.gold, pathIdx:1, slowTimer:0,
    regenTimer: def.regen ? 1 : 0, alive:true,
    id:Math.random(),
    sx:start.x, sy:start.y,  // screen position
    gc:PATH_CELLS[0].c, gr:PATH_CELLS[0].r, // approx grid position for depth sort
  });
}

// ── COMBAT ────────────────────────────────────────────────────────
function applyDamage(enemy, dmg, towerKey) {
  const ed = ENEMY_DEFS[enemy.type];
  const tw = TOWER_DEFS[towerKey];
  const actual = tw && tw.ignoresArmor ? dmg : dmg * (1 - ed.armor);
  enemy.hp -= actual;
  if (tw && tw.slow > 0) enemy.slowTimer = 2.5;
  addFloater(`-${Math.ceil(actual)}`, enemy.sx, enemy.sy - 20, tw.projColor);
}

function fireTower(tower, enemy) {
  const def = TOWER_DEFS[tower.key];
  tower.fireFlash = 0.12;
  if (def.beam) {
    applyDamage(enemy, def.dmg, tower.key);
    const tp = isoProject(tower.col+0.5, tower.row+0.5);
    state.projectiles.push({ towerKey: tower.key, beam: true, ox:tp.x, oy:tp.y-TH*0.75, x:enemy.sx, y:enemy.sy, alpha:1, life:0.12 });
  } else {
    const tp = isoProject(tower.col+0.5, tower.row+0.5);
    if (def.splash) {
      state.projectiles.push({ towerKey:tower.key, x:tp.x, y:tp.y-TH*0.5, tx:enemy.sx, ty:enemy.sy, spd:300, splash:def.splash, dmg:def.dmg, life:1 });
    } else {
      const dx=enemy.sx-tp.x, dy=enemy.sy-tp.y;
      const dist=Math.hypot(dx,dy)||1;
      state.projectiles.push({ towerKey:tower.key, x:tp.x, y:tp.y-TH*0.5, vx:dx/dist*380, vy:dy/dist*380, targetId:enemy.id, dmg:def.dmg, slow:def.slow, life:1.5 });
    }
  }
}

// ── PARTICLES / FLOATERS ──────────────────────────────────────────
function addParticles(x, y, color, n=10) {
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=50+Math.random()*100;
    state.particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:0.5+Math.random()*0.3, maxLife:0.6, color, size:2+Math.random()*2.5 });
  }
}
function addSplash(x, y, r, color) {
  state.particles.push({ x, y, vx:0, vy:0, life:0.35, maxLife:0.35, color, size:r, type:'splash' });
}
function addFloater(text, x, y, color='#fff') {
  state.floaters.push({ text, x, y, vy:-38, life:0.9, color });
}

// ── UPDATE ────────────────────────────────────────────────────────
let lastTime=0;
function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  const rawDt = Math.min((ts-lastTime)/1000, 0.05); lastTime=ts;
  const dt = rawDt*speedMult;
  update(dt); render();
}

function update(dt) {
  if (state.phase==='gameover') return;

  // Spawn
  if (state.phase==='combat' && state.spawnQueue.length>0) {
    state.spawnElapsed += dt*1000;
    while (state.spawnQueue.length>0 && state.spawnElapsed>=state.spawnQueue[0].delay) {
      spawnEnemy(state.spawnQueue.shift().type);
    }
  }

  // Move enemies along path
  for(let i=state.enemies.length-1;i>=0;i--) {
    const e = state.enemies[i];
    if (!e.alive) continue;
    if (e.slowTimer>0) e.slowTimer-=dt;
    const spd = e.slowTimer>0 ? e.spd*0.45 : e.spd;
    // Regen
    if (e.regenTimer>0) { e.regenTimer-=dt; if(e.regenTimer<=0){e.hp=Math.min(e.maxHp,e.hp+e.maxHp*0.05);e.regenTimer=1;} }

    if (e.pathIdx<PATH_CELLS.length) {
      const target = cellCenter(PATH_CELLS[e.pathIdx].c, PATH_CELLS[e.pathIdx].r);
      const dx=target.x-e.sx, dy=target.y-e.sy;
      const dist=Math.hypot(dx,dy);
      if (dist<4) {
        e.pathIdx++;
        if (e.pathIdx>=PATH_CELLS.length) {
          const lc = ENEMY_DEFS[e.type].livesCost ?? 1;
          state.lives -= lc;
          addParticles(e.sx, e.sy, '#ef4444', 12);
          state.enemies.splice(i,1);
          updateHUD();
          if (state.lives<=0){ state.lives=0; updateHUD(); showOverlay(false); }
          continue;
        }
      } else {
        e.sx += dx/dist*spd*dt*TW*0.5;
        e.sy += dy/dist*spd*dt*TH*0.5;
        // Update approx grid pos for depth sorting
        const gi = screenToGrid(e.sx, e.sy);
        e.gc=gi.col; e.gr=gi.row;
      }
    }
  }

  // Remove dead enemies
  for(let i=state.enemies.length-1;i>=0;i--) {
    if (state.enemies[i].hp<=0) {
      const e=state.enemies[i];
      state.gold+=e.gold; state.score+=e.gold*10; state.kills++;
      addParticles(e.sx, e.sy, ENEMY_DEFS[e.type].color, 12);
      addFloater(`+${e.gold}⬡`, e.sx, e.sy-25, '#ffd700');
      state.enemies.splice(i,1); updateHUD();
    }
  }

  // Wave end
  if (state.phase==='combat' && state.spawnQueue.length===0 && state.enemies.length===0) {
    state.phase='prep';
    const bonus=20+state.wave*5; state.gold+=bonus;
    addFloater(`+${bonus}⬡ WAVE BONUS`, W/2, H/2, '#ffd700');
    updateHUD(); renderTowerPanel();
    scheduleAutoSendWave();
  }

  // Tower targeting & firing
  state.towers.forEach(tower => {
    tower.cooldown-=dt;
    if (tower.fireFlash>0) tower.fireFlash-=dt;
    if (tower.cooldown>0) return;
    const def=TOWER_DEFS[tower.key];
    let best=null, bestIdx=-1;
    state.enemies.forEach(e=>{
      const dist=gridDist(tower.col, tower.row, e.gc, e.gr);
      if (dist<=def.range && e.pathIdx>bestIdx) { best=e; bestIdx=e.pathIdx; }
    });
    if (best) { fireTower(tower, best); tower.cooldown=1/def.rate; }
  });

  // Projectile movement
  for(let i=state.projectiles.length-1;i>=0;i--){
    const p=state.projectiles[i];
    p.life-=dt;
    if (TOWER_DEFS[p.towerKey]?.beam) { p.alpha-=dt*8; if(p.alpha<=0){state.projectiles.splice(i,1);} continue; }
    if (p.splash) {
      const dx=p.tx-p.x, dy=p.ty-p.y, dist=Math.hypot(dx,dy);
      if (dist<8||p.life<=0) {
        addSplash(p.tx, p.ty, p.splash*TW*0.25, TOWER_DEFS[p.towerKey].projColor);
        addParticles(p.tx, p.ty, TOWER_DEFS[p.towerKey].projColor, 12);
        state.enemies.forEach(e=>{ if(Math.hypot(e.sx-p.tx,e.sy-p.ty)<p.splash*TW*0.3) applyDamage(e,p.dmg,p.towerKey); });
        state.projectiles.splice(i,1); continue;
      }
      p.x+=dx/dist*p.spd*dt; p.y+=dy/dist*p.spd*dt;
    } else {
      const tgt=state.enemies.find(e=>e.id===p.targetId);
      if (tgt) {
        const dx=tgt.sx-p.x, dy=tgt.sy-p.y, dist=Math.hypot(dx,dy);
        if (dist<12||p.life<=0) {
          applyDamage(tgt, p.dmg, p.towerKey);
          if(p.slow) tgt.slowTimer=2.5;
          addParticles(p.x, p.y, TOWER_DEFS[p.towerKey].projColor, 5);
          state.projectiles.splice(i,1); continue;
        }
        p.x+=dx/dist*380*dt; p.y+=dy/dist*380*dt;
      } else {
        p.x+=p.vx*dt; p.y+=p.vy*dt;
        if(p.life<=0){state.projectiles.splice(i,1);}
      }
    }
  }

  // Particles
  for(let i=state.particles.length-1;i>=0;i--){
    const p=state.particles[i]; p.life-=dt;
    if(p.life<=0){state.particles.splice(i,1);continue;}
    if(p.type!=='splash'){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=120*dt;}
  }

  // Floaters
  for(let i=state.floaters.length-1;i>=0;i--){
    const f=state.floaters[i]; f.life-=dt; f.y+=f.vy*dt;
    if(f.life<=0) state.floaters.splice(i,1);
  }
}

// ── OVERLAY ───────────────────────────────────────────────────────
function showOverlay(victory) {
  clearAutoSendTimeout();
  state.phase='gameover';
  const o=document.getElementById('overlay'), t=document.getElementById('overlay-title'), m=document.getElementById('overlay-msg');
  const hint = document.getElementById('lb-submit-hint');
  const nameIn = document.getElementById('lb-name-input');
  const subBtn = document.getElementById('lb-submit-btn');
  t.textContent=victory?'VICTORY':'DEFEAT';
  t.classList.remove('victory','defeat');
  t.classList.add(victory?'victory':'defeat');
  m.innerHTML=victory
    ? `You defended the base!<br><br>Score: <span class="stat">${state.score}</span> &nbsp; Kills: <span class="stat">${state.kills}</span> &nbsp; Wave: <span class="stat">${state.wave}</span>`
    : `The enemy broke through!<br><br>Wave: <span class="stat">${state.wave}</span> &nbsp; Kills: <span class="stat">${state.kills}</span> &nbsp; Score: <span class="stat">${state.score}</span>`;
  if (hint) hint.textContent = '';
  if (nameIn) { nameIn.value = ''; nameIn.disabled = false; }
  if (subBtn) subBtn.disabled = false;
  o.classList.add('show');
}

// ── INPUT ─────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e=>{
  const { sx, sy } = canvasCoords(e.clientX, e.clientY);
  const g=screenToGrid(sx,sy);
  state.mouseCol=g.col; state.mouseRow=g.row;
});

canvas.addEventListener('click', e=>{
  const { sx, sy } = canvasCoords(e.clientX, e.clientY);
  const g=screenToGrid(sx,sy);
  if (state.placing) placeTower(g.col, g.row);
  else removeTowerAt(g.col, g.row);
});

canvas.addEventListener('contextmenu', e=>{ e.preventDefault(); state.placing=null; renderTowerPanel(); });
document.getElementById('wave-btn').addEventListener('click', sendWave);
document.getElementById('auto-wave-btn').addEventListener('click', ()=>{
  state.autoSendWaves = !state.autoSendWaves;
  if (!state.autoSendWaves) clearAutoSendTimeout();
  updateHUD();
  if (state.autoSendWaves && state.phase === 'prep') scheduleAutoSendWave(1200);
});
document.getElementById('speed-btn').addEventListener('click', ()=>{
  speedMult=speedMult===1?2:1;
  document.getElementById('speed-btn').textContent=speedMult===1?'2× SPEED':'1× SPEED';
});

// ── FIREBASE LEADERBOARD (Spark / Firestore) ──────────────────────
let firebaseDb = null;

function initFirebaseLeaderboard() {
  const cfg = typeof window.TD_FIREBASE_CONFIG !== 'undefined' ? window.TD_FIREBASE_CONFIG : null;
  if (!cfg || !cfg.apiKey || !cfg.projectId) return null;
  if (typeof firebase === 'undefined') return null;
  try {
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    firebaseDb = firebase.firestore();
    return firebaseDb;
  } catch (e) {
    console.warn('Firebase init failed', e);
    return null;
  }
}

function escapeLbHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function submitLeaderboardFromUI() {
  const hint = document.getElementById('lb-submit-hint');
  const btn = document.getElementById('lb-submit-btn');
  const nameIn = document.getElementById('lb-name-input');
  const name = (nameIn && nameIn.value.trim()) || 'Pilot';
  if (!firebaseDb) {
    if (hint) hint.textContent = 'Configure firebase-config.js (apiKey + projectId) and Firestore rules.';
    return;
  }
  btn.disabled = true;
  if (nameIn) nameIn.disabled = true;
  try {
    await firebaseDb.collection('leaderboard').add({
      name: name.slice(0, 24),
      score: Math.floor(Math.max(0, state.score)),
      wave: Math.floor(Math.max(0, state.wave)),
      kills: Math.floor(Math.max(0, state.kills)),
      ts: firebase.firestore.FieldValue.serverTimestamp(),
    });
    if (hint) hint.textContent = 'Submitted. Check Rankings.';
  } catch (e) {
    if (hint) hint.textContent = (e && e.message) ? String(e.message) : 'Submit failed';
    btn.disabled = false;
    if (nameIn) nameIn.disabled = false;
  }
}

async function openLeaderboardPanel() {
  const ov = document.getElementById('leaderboard-overlay');
  const list = document.getElementById('lb-list');
  const st = document.getElementById('lb-fetch-status');
  ov.classList.add('show');
  ov.setAttribute('aria-hidden', 'false');
  list.innerHTML = '';
  if (!firebaseDb) {
    st.textContent = 'Offline: add Firebase web config + enable Firestore (see firestore.rules).';
    return;
  }
  st.textContent = 'Loading…';
  try {
    const snap = await firebaseDb.collection('leaderboard').orderBy('score', 'desc').limit(25).get();
    st.textContent = snap.empty ? 'No scores yet.' : '';
    let i = 0;
    snap.forEach(doc => {
      const d = doc.data();
      const li = document.createElement('li');
      li.innerHTML = `<span>${++i}</span><span class="lb-n">${escapeLbHtml(d.name || '—')}</span><span class="lb-s">${d.score} · W${d.wave}</span>`;
      list.appendChild(li);
    });
  } catch (e) {
    st.textContent = (e && e.message) ? String(e.message) : 'Load failed (check Firestore index/rules).';
  }
}

function closeLeaderboardPanel() {
  const ov = document.getElementById('leaderboard-overlay');
  ov.classList.remove('show');
  ov.setAttribute('aria-hidden', 'true');
}

document.getElementById('lb-btn').addEventListener('click', () => openLeaderboardPanel());
document.getElementById('lb-close').addEventListener('click', closeLeaderboardPanel);
document.getElementById('leaderboard-overlay').addEventListener('click', e => {
  if (e.target.id === 'leaderboard-overlay') closeLeaderboardPanel();
});
document.getElementById('lb-submit-btn').addEventListener('click', () => submitLeaderboardFromUI());

// ── UTILS ─────────────────────────────────────────────────────────
function darken(hex, amount) {
  const n=parseInt(hex.replace('#',''),16);
  const r=Math.max(0,(n>>16)-amount);
  const g=Math.max(0,((n>>8)&0xff)-amount);
  const b=Math.max(0,(n&0xff)-amount);
  return `rgb(${r},${g},${b})`;
}

// ── BOOT ──────────────────────────────────────────────────────────
initFirebaseLeaderboard();
state = makeState();
rollNewMap();
initTheme();
updateHUD();
if (state.autoSendWaves && state.phase === 'prep') scheduleAutoSendWave(2000);
requestAnimationFrame(ts=>{ lastTime=ts; requestAnimationFrame(gameLoop); });
fitLayout();
scheduleFitLayout();
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => scheduleFitLayout());
}
if (typeof ResizeObserver !== 'undefined') {
  const _lr = document.getElementById('layout-root');
  if (_lr) new ResizeObserver(() => scheduleFitLayout()).observe(_lr);
}
